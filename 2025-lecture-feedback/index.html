<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김하연 대리 강의 후기 (Cute & Premium Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=Outfit:wght@700;800&family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <style>
        :root {
            /* Theme 1: Yellow Pastel (Default) */
            --primary: #fbbf24;
            --bg-color: #fffbeb;
            --postit-bg: #fefcbf;
            --text-main: #78350f;
            --text-sub: #92400e;
            --accent: #fef3c7;
        }

        [data-theme="pink"] {
            /* Theme 2: Pink Pastel */
            --primary: #f472b6;
            --bg-color: #fff1f2;
            --postit-bg: #ffe4e6;
            --text-main: #831843;
            --text-sub: #90114e;
            --accent: #fce7f3;
        }

        [data-theme="purple"] {
            /* Theme 3: Purple Pastel */
            --primary: #a78bfa;
            --bg-color: #f5f3ff;
            --postit-bg: #e0e7ff;
            --text-main: #4c1d95;
            --text-sub: #6d28d9;
            --accent: #ddd6fe;
        }

        [data-theme="green"] {
            /* Theme 4: Green Pastel */
            --primary: #34d399;
            --bg-color: #f0fdf4;
            --postit-bg: #dcfce7;
            --text-main: #065f46;
            --text-sub: #064e3b;
            --accent: #d1fae5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            transition: all 0.5s ease;
        }

        /* Main Tabs */
        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 10;
        }
        .main-tab {
            padding: 1rem 3rem;
            border-radius: 50px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            color: var(--text-sub);
        }
        .main-tab:hover {
            transform: translateY(-2px);
        }
        .main-tab.active {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Dashboard View */
        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto 5rem;
            padding: 3rem;
            background: white;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: none; /* hidden by default */
        }
        .dashboard-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--text-main);
            font-family: 'Jua', sans-serif;
        }

        /* Premium Glass Header Layout */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem 3rem;
        }

        .header-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3.5rem;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2rem 3rem; /* 크기 축소 */
            border-radius: 35px;
            box-shadow: 
                0 15px 30px rgba(0,0,0,0.05),
                inset 0 0 0 2px rgba(255,255,255,0.7);
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .header-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 30px 50px rgba(0,0,0,0.1),
                inset 0 0 0 2px rgba(255,255,255,0.9);
        }

        .circle-blur {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
            opacity: 0.5;
            animation: float 6s infinite ease-in-out alternate;
        }
        .cb-1 {
            width: 250px; height: 250px;
            background: var(--primary);
            top: -80px; left: -80px;
        }
        .cb-2 {
            width: 300px; height: 300px;
            background: white;
            bottom: -100px; right: -50px;
            animation-delay: -3s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, 20px) scale(1.1); }
        }

        .title-group {
            text-align: left;
            position: relative;
            z-index: 2;
        }

        /* Cute, Thick & 3D Title */
        h1 {
            font-family: 'Gaegu', cursive;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
            letter-spacing: -1px;
            margin-bottom: 0;
            text-align: center; /* 가운데 정렬 추가 */
            text-shadow: 
                -1px -1px 0 #fff,
                 1px -1px 0 #fff,
                -1px  1px 0 #fff,
                 1px  1px 0 #fff,
                 3px 3px 0px rgba(0,0,0,0.05);
            display: inline-block;
        }
        
        h1 .title-cohort { 
            font-size: 2.8rem; 
            color: var(--primary); 
            display: block; 
            font-weight: 900; /* 더 뚱뚱하게 */
            margin-bottom: 0.3rem; 
            letter-spacing: -2px;
        } 
        h1 .title-name { 
            font-size: 2.4rem; /* 2.0rem * 1.2 = 2.4rem */
            color: #a1a1a1; 
            font-weight: 800; 
            display: inline;
        }
        h1 .title-event { 
            font-size: 2.4rem; 
            color: #a1a1a1; 
            font-weight: 800; 
            display: inline;
            margin-left: 0.3rem;
            opacity: 0.9;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-sub);
            font-weight: 600;
            opacity: 0.8;
            padding-left: 0.5rem;
        }

        /* Compact Video on the right */
        .video-box {
            width: 240px;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 5px solid white;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-box:hover { transform: scale(1.05); }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 테마 스위처 */
        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            padding: 0.5rem;
            border-radius: 15px;
            display: flex;
            gap: 0.8rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .theme-btn {
            width: 30px; height: 30px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-btn.active { border-color: var(--primary); }
        .btn-yellow { background: #fbbf24; }
        .btn-pink { background: #f472b6; }
        .btn-purple { background: #a78bfa; }
        .btn-green { background: #34d399; }

        /* Sparkle Trail Effect */
        .sparkle-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            user-select: none;
            animation: sparkle-flash 0.6s ease-in-out forwards;
        }
        @keyframes sparkle-flash {
            0% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
            100% { opacity: 0; transform: scale(0) rotate(360deg) translateY(-10px); }
        }

        /* Filter Chips */
        .filter-section {
            display: flex;
            justify-content: center;
            margin-bottom: 4rem;
        }
        .filter-container {
            display: flex;
            gap: 0.8rem;
            background: white;
            padding: 0.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .filter-chip {
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-sub);
            transition: all 0.3s;
        }
        .filter-chip.active {
            background: var(--primary);
            color: white;
        }

        /* Post-it Grid with Sorting Support */
        .feedback-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 3rem;
            padding: 0 5rem 100px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .feedback-grid:hover .feedback-card {
            opacity: 0.4;
            filter: blur(3px);
        }

        /* Post-it Card - Refined */
        .feedback-card {
            background-color: var(--postit-bg);
            padding: 2.5rem;
            height: 420px;
            border-radius: 2px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }

        /* Cute Emoji in Corner */
        .feedback-card::before {
            content: attr(data-emoji);
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.8rem;
            filter: drop-shadow(2px 2px 0 white);
        }

        /* No Rotation on rollover */
        .feedback-card:hover {
            opacity: 1 !important;
            filter: blur(0) !important;
            transform: translateY(-10px) scale(1.05);
            z-index: 100;
            background-color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            height: auto;
            min-height: 420px;
        }

        .card-header {
            display: flex;
            justify-content: flex-end; /* Date on right */
            margin-bottom: 2rem;
            padding-top: 10px;
        }
        .participant-no {
            position: absolute;
            top: 25px;
            right: 25px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            opacity: 0.3;
            font-size: 1.2rem;
        }
        .date { font-size: 0.9rem; color: var(--text-sub); opacity: 0.6; }

        /* Highly Readable Content Font */
        .content {
            font-family: 'Gowun Dodum', sans-serif;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #444;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            line-clamp: 6;
            -webkit-box-orient: vertical;
            padding: 0 10px;
        }

        .feedback-card:hover .content {
            -webkit-line-clamp: unset;
            display: block;
            overflow: visible;
            height: auto;
        }

        .tag-container {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .tag {
            font-size: 0.8rem;
            background: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-weight: 700;
            color: var(--text-main);
        }

        #backToWordCloudBtn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2) !important;
        }

        @media (max-width: 768px) {
            .header-container { flex-direction: column; text-align: center; }
            h1 { font-size: 3rem; }
            .video-box { width: 100%; height: 200px; }
            .feedback-grid { grid-template-columns: 1fr; padding: 0 2rem; }
        }
    </style>
</head>
<body data-theme="yellow">

    <div class="theme-switcher">
        <div class="theme-btn btn-yellow active" onclick="setTheme('yellow', this)"></div>
        <div class="theme-btn btn-pink" onclick="setTheme('pink', this)"></div>
        <div class="theme-btn btn-purple" onclick="setTheme('purple', this)"></div>
        <div class="theme-btn btn-green" onclick="setTheme('green', this)"></div>
    </div>

    <div class="header-container">
        <div class="header-card">
            <!-- Decorative elements -->
            <div class="circle-blur cb-1"></div>
            <div class="circle-blur cb-2"></div>
            
            <div class="title-group">
                <h1>
                    <span class="title-cohort">['25년 하반기 신입직원 입문교육]</span>
                    <span class="title-name">김하연 대리</span>
                    <span class="title-event">강의 후기</span>
                </h1>
            </div>
            <div class="video-box" style="z-index:2; position:relative;">
                <video src="haeyon.mp4" autoplay muted loop playsinline></video>
            </div>
        </div>
    </div>

    <!-- 탭 네비게이션 -->
    <div class="main-tabs">
        <div class="main-tab active" id="tabGallery" onclick="switchTab('gallery')">후기 모아보기</div>
        <div class="main-tab" id="tabWordCloud" onclick="switchTab('wordcloud')">베스트 코멘트 클라우드</div>
    </div>

    <!-- 뒤로가기 플로팅 버튼 -->
    <button id="backToWordCloudBtn" onclick="switchTab('wordcloud')" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 1000; background: var(--primary); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 800; font-family: 'Gowun Dodum', sans-serif; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 1.1rem;">🔙 클라우드로 돌아가기</button>

    <!-- 갤러리 탭 -->
    <div id="gallerySection">
        <div class="filter-section">
            <div class="filter-container">
                <div class="filter-chip active" data-filter="전체">모두보기</div>
                <div class="filter-chip" data-filter="강의내용">💡강의내용</div>
                <div class="filter-chip" data-filter="재미">🤪재미</div>
                <div class="filter-chip" data-filter="전문성">💼전문성</div>
                <div class="filter-chip" data-filter="전달력">🎙️전달력</div>
                <div class="filter-chip" data-filter="동기부여">🔥동기부여</div>
                <div class="filter-chip" data-filter="외모">✨외모</div>
                <div class="filter-chip" data-filter="기타">📌기타</div>
            </div>
        </div>

        <div class="feedback-grid" id="feedbackGrid">
            <!-- JS 동적 생성 -->
        </div>
    </div>

    <script src="data.js"></script>

    <!-- 워드클라우드 탭 (2번째) -->
    <section id="wordcloudSection" class="dashboard-container" style="display: none;">
        <h2 class="dashboard-title">✨ 베스트 키워드</h2>
        <p style="text-align: center; margin-top: -1.5rem; margin-bottom: 1.5rem; color: #888; font-size: 0.9rem;">(키워드를 누르면 해당 후기로 이동합니다)</p>
        <div id="wordcloud-canvas-container" style="width: 100%; height: 500px; background: #fafafa; border-radius: 20px; position: relative; overflow: hidden;">
            <canvas id="bestCommentCloud" style="width: 100%; height: 100%;"></canvas>
        </div>
        <div style="margin-top: 20px; text-align: center; color: #666; font-family: 'Gowun Dodum', sans-serif;">
            <p>우리 교육생분들이 남겨주신 가장 인상 깊은 표현들을 모았습니다! ✨</p>
        </div>
    </section>

    <script src="data.js"></script>
    <script>
        const emojis = ["✨", "🌈", "🔥", "🥰", "🎈", "🍀", "💫", "🧸", "⭐", "🦋"];

        function setTheme(theme, btn) {
            document.body.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const grid = document.getElementById('feedbackGrid');

        function render(filter = '전체') {
            grid.innerHTML = '';
            
            // 1. Filtering
            let filtered = feedbackData.filter(item => filter === '전체' || item.category.includes(filter));
            
            // 2. Sorting: Content length DSC (Long content first, Short content last as requested)
            // "글자수가 적은 카드는 뒤쪽으로 빼줘" = 글자수 많은 카드가 앞쪽
            filtered.sort((a, b) => b.content.length - a.content.length);

            filtered.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'feedback-card';
                card.setAttribute('data-emoji', emojis[idx % emojis.length]);
                
                const tags = item.category.split(',').map(t => 
                    t.trim() ? `<span class="tag">#${t.trim()}</span>` : ''
                ).join('');

                // '김지수'만 '김**'로 특정하여 수정
                let maskedContent = item.content.replace(/김지수/g, '김**');

                card.innerHTML = `
                    <div class="participant-no">No. ${item.pno}</div>
                    <div class="card-header">
                        <span class="date">${item.date}</span>
                    </div>
                    <div class="content">${maskedContent}</div>
                    <div class="tag-container">${tags}</div>
                `;
                grid.appendChild(card);
            });
        }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                render(this.getAttribute('data-filter'));
            });
        });

        if (typeof feedbackData !== 'undefined') {
            render();
        }

        /* 탭 스위칭 로직 */
        function switchTab(tab) {
            document.getElementById('gallerySection').style.display = (tab === 'gallery') ? 'block' : 'none';
            document.getElementById('wordcloudSection').style.display = (tab === 'wordcloud') ? 'block' : 'none';
            
            document.getElementById('tabGallery').classList.toggle('active', tab === 'gallery');
            document.getElementById('tabWordCloud').classList.toggle('active', tab === 'wordcloud');
            
            const backBtn = document.getElementById('backToWordCloudBtn');
            if (backBtn) backBtn.style.display = 'none';

            if (tab === 'wordcloud' && !window.wordcloudInitialized) {
                // Ensure layout is ready
                setTimeout(initWordCloud, 100);
                window.wordcloudInitialized = true;
            }
        }

        /* 워드클라우드 생성 로직 */
        function initWordCloud() {
            const bestPhrases = [
                "귀에 쏙쏙 들어왔어요", "발음이 또박또박", "유쾌하고 재밌는 강의", "명강의였습니다", 
                "완전 프로페셔널", "이해가 쏙쏙", "아나운서분 같은 목소리", "확신의 ENTJ", 
                "입사가 더 설레요", "일잘러", "반짝반짝 눈", "강의력 좋은 젊은 교수님", 
                "똑순이", "미모 열일", "지루함 없는 꽉찬 강의", "해맑은 미소", 
                "또 듣고 싶어요", "꿀강의였습니다", "딕션이 좋으셔서", "전문성있는 모습", 
                "열정적인 모습", "실제 사례", "꿀팁", "유익한 시간", 
                "까랑까랑", "집중력 최고", "사내강사", "배울 점이 너무 많아서", 
                "자랑스러워요", "존경함니당", "한지민 닮았어용", "손예진닮았다고", 
                "4시간이 순삭", "실전에서 써먹을 수 있는", "완벽한 강의"
            ];

            const canvas = document.getElementById('bestCommentCloud');
            const container = document.getElementById('wordcloud-canvas-container');
            
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;

            // 사용자 제공 6가지 파스텔 컬러칩
            const themeColors = [
                '#C5D5F5', // 연파랑
                '#C8B8E8', // 연보라
                '#FFB8C8', // 연핑크
                '#FAF0AA', // 연노랑
                '#C5EDD5', // 연민트
                '#C0EEE8'  // 연틸
            ];

            const list = bestPhrases.map((phrase) => {
                let weight = 24 + Math.random() * 26;
                const highlights = ["전문성있는 모습", "딕션이 좋으셔서", "일잘러", "이해가 쏙쏙", "강의력 좋은 젊은 교수님"];
                if (highlights.includes(phrase)) weight = 60 + Math.random() * 10;
                if (phrase.includes("한지민") || phrase.includes("손예진")) weight = 38;
                return [phrase, weight];
            }).sort(() => Math.random() - 0.5);

            WordCloud(canvas, {
                list: list,
                gridSize: 10,
                weightFactor: 1.1,
                fontFamily: "'Jua', 'Noto Sans KR', sans-serif",
                color: function() {
                    return themeColors[Math.floor(Math.random() * themeColors.length)];
                },
                rotateRatio: 0.4,
                rotationSteps: 2,
                backgroundColor: '#ffffff', // 순백 배경 유지, 키워드는 위에 같혀짐
                shuffle: true,
                drawOutOfBound: false,
                shrinkToFit: true,
                ellipticity: 0.75,
                hover: function(item, dimension) {
                    canvas.style.cursor = dimension ? 'pointer' : 'default';
                },
                click: function(item) {
                    if (item) scrollToKeyword(item[0]);
                }
            });
        }

        /* 키워드 클릭 시 해당 카드로 이동 */
        function scrollToKeyword(keyword) {
            switchTab('gallery');
            
            const backBtn = document.getElementById('backToWordCloudBtn');
            if (backBtn) backBtn.style.display = 'block';

            // 전체 보기로 초기화 (필요시)
            const allChip = document.querySelector('.filter-chip[data-filter="전체"]');
            if (allChip) allChip.click();

            setTimeout(() => {
                const cards = document.querySelectorAll('.feedback-card');
                for (let card of cards) {
                    const content = card.querySelector('.content').textContent;
                    if (content.includes(keyword)) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        card.style.transition = 'all 0.5s';
                        card.style.backgroundColor = 'white';
                        card.style.boxShadow = '0 0 30px rgba(167, 139, 250, 0.5)';
                        card.style.transform = 'scale(1.05)';
                        
                        setTimeout(() => {
                            card.style.boxShadow = '';
                            card.style.transform = '';
                            card.style.backgroundColor = '';
                        }, 2000);
                        break;
                    }
                }
            }, 500);
        }

        /* 대시보드 차트 생성 로직 */
        function initDashboard() {
            const stopwords = ["너무", "정말", "진짜", "많이", "있는", "같습니다", "같아요", "입니다", "하는", "그리고", "강의", "대리님", "좋은", "감사합니다", "좋았습니다", "있어서", "수업", "시간", "대한", "부분", "같은", "모든", "강의를", "많아", "제가", "저도", "것이", "가장", "제가", "그냥", "이렇게", "하면서", "하고", "하시는", "해주셔서", "들어서", "통해", "항상", "이해", "내용", "좋아요", "보고", "들으면서", "않고", "도움이", "강의였습니다", "귀에", "설명해주셔서", "많은", "있었습니다", "알려주셔서", "좋았어요", "실제", "오늘", "들을", "인정조사", "들었습니다"];
            const wordCounts = {};

            feedbackData.forEach(item => {
                // 한글, 영어, 숫자만 추출
                const words = item.content.split(/[^가-힣a-zA-Z0-9]+/);
                words.forEach(w => {
                    if (w.length > 1 && !stopwords.includes(w)) {
                        wordCounts[w] = (wordCounts[w] || 0) + 1;
                    }
                });
            });

            const sortedWords = Object.entries(wordCounts)
                                      .sort((a,b) => b[1] - a[1])
                                      .slice(0, 10);

            const ctx = document.getElementById('keywordChart').getContext('2d');
            
            Chart.defaults.font.family = "'Gowun Dodum', sans-serif";
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sortedWords.map(w => w[0]),
                    datasets: [{
                        label: '단어 언급 횟수',
                        data: sortedWords.map(w => w[1]),
                        backgroundColor: [
                            '#a78bfa', '#fbbf24', '#f472b6', '#34d399', '#60a5fa',
                            '#fbb1bd', '#c084fc', '#facc15', '#a3e635', '#38bdf8'
                        ],
                        borderRadius: 10,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(255,255,255,0.9)',
                            titleColor: '#333',
                            bodyColor: '#666',
                            borderColor: '#e5e7eb',
                            borderWidth: 1,
                            padding: 12,
                            boxPadding: 6
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 14 } } }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        /* Sparkle Mouse Trail */
        let lastSparkleTime = 0;
        document.addEventListener('mousemove', function(e) {
            const now = Date.now();
            if (now - lastSparkleTime > 50) {
                lastSparkleTime = now;
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-trail';
                sparkle.innerHTML = '✨';
                sparkle.style.left = (e.clientX - 10) + 'px';
                sparkle.style.top = (e.clientY - 10) + 'px';
                
                const colors = ['#fde68a', '#fbcfe8', '#c4b5fd', '#bae6fd', '#fff'];
                sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
                sparkle.style.fontSize = (Math.random() * 0.4 + 0.4) + 'rem'; // Smaller size
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    if (sparkle.parentNode) sparkle.parentNode.removeChild(sparkle);
                }, 600); // Shorter duration
            }
        });
    </script>
</body>
</html>
